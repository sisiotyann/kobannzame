・発動時の効果：

        vhard: '<strong>■ オプション1：遅延調教</strong>※ハードより発動確率上昇<br><br><strong>■ オプション2：無限調教</strong>※ハードより発動確率上昇<br><br><strong>■ オプション3：肉体支配</strong><br><span style="color:#ff9800; font-size:0.8rem;">※常に調教の恐怖を感じたい方向け</span>',
        
        hell: '<strong>■ オプション1：遅延調教</strong>※ベリーハードより発動確率上昇<br><br><strong>■ オプション2：無限調教</strong>※ベリーハードより発動確率上昇<br><br><strong>■ オプション3：肉体支配</strong>※ベリーハードより発動確率上昇<br><br><strong>■ オプション4：延長調教</strong><br><span style="color:#ff1e27; font-weight:bold; font-size:0.8rem;">※極めて冷酷な調教です容赦は一切ありません</span>'
    };

    function switchMode(mode, btn) {
        currentMode = mode;
        document.getElementById('info').innerHTML = modeInfos[mode];
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function copyPrompt() {
        const targetId = 'prompt-' + currentMode;
        const text = document.getElementById(targetId).value;
        
        // 確実にコピーするための最新の書き方
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                alert('プロンプトをコピーしました。ネタバレ防止の為内容を見ずにそのまま貼り付けてください。');
            }).catch(err => {
                alert('コピーに失敗ました。もう一度試してみてください。');
            });
        } else {
            // 古いブラウザ用のフォールバック
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert('プロンプトをコピーしました。ネタバレ防止の為内容を見ずにそのまま貼り付けてください。');
        }
    }
</script>
