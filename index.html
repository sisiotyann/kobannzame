<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI調教プロンプト配布会場</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; margin-bottom: 25px; color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .tabs { display: flex; justify-content: space-between; margin-bottom: 25px; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #aaa; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .tab-btn.active { background: #fff; color: #121212; }
        .info-box { background: #252525; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 25px; font-size: 0.9rem; line-height: 1.6; border-left: 4px solid #fff; }
        .copy-btn { width: 100%; padding: 16px; background: #e50914; color: #fff; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #ff1e27; }
        .hidden-text { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>⛓️ 難易度別プロンプト配布会場</h1>
    
    <!-- タブ切り替えボタン -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('hard', this)">ハードモード</button>
        <button class="tab-btn" onclick="switchMode('vhard', this)">ベリーハードモード</button>
        <button class="tab-btn" onclick="switchMode('hell', this)">ヘルモード</button>
    </div>

    <!-- モードごとの説明（読者の目に入る部分） -->
    <div id="info" class="info-box">
        <strong>【ハードモード構成】</strong><br>
        ・オプション1：終わらない10カウント<br>
        ・オプション2：絶望のカウントダウン<br>
        <span style="color:#aaa; font-size:0.8rem;">（適度な絶望を味わいたい方向け）</span>
    </div>

    <!-- コピーボタン -->
    <button class="copy-btn" onclick="copyPrompt()">
        📋 このモードを1発コピーする
    </button>

    <!-- プロンプトの隠し置き場（読者には絶対に見えません） -->
    <textarea id="prompt-hard" class="hidden-text">【ここにハード用のプロンプトをベタ貼り（後で書き換えOK）】</textarea>
    <textarea id="prompt-vhard" class="hidden-text">【ここにベリーハード用のプロンプトをベタ貼り】</textarea>
    <textarea id="prompt-hell" class="hidden-text">【ここにヘル用のプロンプトをベタ貼り】</textarea>
</div>

<script>
    // 初期状態はハード
    let currentMode = 'hard';

    // モードごとの表示テキスト設定
    const modeInfos = {
        hard: '<strong>【ハードモード構成】</strong><br>・オプション1：終わらない10カウント<br>・オプション2：絶望のカウントダウン<br><span style="color:#aaa; font-size:0.8rem;">適度な絶望を味わいたい方向け<br>（オプション1，2追加）</span>',
        vhard: '<strong>【ベリーハードモード構成】</strong><br>・オプション1：終わらない10カウント<br>・オプション2：絶望のカウントダウン<br>・オプション3： 限界寸止め地獄<br><span style="color:#ff9800; font-size:0.8rem;">常に調教の恐怖を感じたい方向け<br>（オプション3追加 オプション1，2発動確立上昇）</span>',
        hell: '<strong>【ヘルモード構成】</strong><br>・オプション1：終わらない10カウント<br>・オプション2：絶望のカウントダウン<br>・オプション3： 限界寸止め地獄<br>・オプション4： 最凶の裏切り：延長調教<br><span style="color:#ff1e27; font-weight:bold; font-size:0.8rem;">極めて冷酷な調教です容赦は一切ありません<br>（オプション4追加 オプション1，2，3発動確立上昇）</span>'
    };

    function switchMode(mode, btn) {
        currentMode = mode;
        document.getElementById('info').innerHTML = modeInfos[mode];
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function copyPrompt() {
        const targetId = 'prompt-' + currentMode;
        const text = document.getElementById(targetId).value;
        navigator.clipboard.writeText(text).then(() => {
            alert('プロンプトをコピーしました。ネタバレ防止の為、内容を見ずにそのままトレーナーに貼り付けてください。);
        });
    }
</script>

</body>
</html>
